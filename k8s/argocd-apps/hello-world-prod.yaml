apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hello-world-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/susovan87/gke-zonal-cluster.git
    targetRevision: v1.0.0
    path: k8s/hello-world-app/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: hello-world-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
